<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Erro {{ codigo }} — SGD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .error-box {
      text-align: center;
      max-width: 420px;
      padding: 40px 32px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .error-code {
      font-size: 5rem; font-weight: 700; line-height: 1;
      color: {% if codigo == 403 %}#dc2626{% elif codigo == 404 %}#d97706{% else %}#374151{% endif %};
      margin-bottom: 8px;
    }
    .error-title { font-size: 1.1rem; font-weight: 600; color: #111827; margin-bottom: 8px; }
    .error-detail { font-size: .83rem; color: #6b7280; margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">{{ codigo }}</div>
    <div class="error-title">{{ mensagem }}</div>
    <div class="error-detail">{{ detalhe }}</div>
    <a href="{{ url_for('dashboard.index') }}"
       style="padding:9px 24px;background:#1d5fa6;color:#fff;border-radius:7px;
              font-size:.85rem;font-weight:600;text-decoration:none;display:inline-block;">
      <i class="bi bi-house me-2"></i>Voltar ao Início
    </a>
  </div>
</body>
</html>
