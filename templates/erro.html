<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro {{ codigo_erro | default('Inesperado') }} — Portal IPVP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-neutral-100 d-flex align-items-center justify-content-center min-vh-100">

  <div class="text-center px-3">
    
    <div class="mb-4 text-danger">
      <i class="bi bi-exclamation-triangle" style="font-size: 5rem; opacity: 0.8;"></i>
    </div>
    
    <h1 class="fw-bold text-dark display-5 mb-2">Erro {{ codigo_erro | default('Interno') }}</h1>
    
    <p class="text-muted fs-5 mb-4 max-w-md mx-auto" style="max-width: 500px;">
      {{ mensagem_erro | default('Ocorreu um problema inesperado ao processar a sua solicitação. A nossa equipa técnica já foi notificada.') }}
    </p>
    
    <div class="d-flex justify-content-center gap-3">
      <button onclick="window.history.back()" class="btn btn-light border shadow-sm fw-medium px-4 py-2 rounded-3 text-neutral-700">
        <i class="bi bi-arrow-left me-2"></i> Voltar
      </button>
      
      <a href="{{ url_for('dashboard.index') }}" class="btn fw-bold px-4 py-2 rounded-3 text-white shadow-sm" style="background-color: var(--color-primary-800);">
        <i class="bi bi-house-door me-2"></i> Ir para o Início
      </a>
    </div>
    
  </div>

</body>
</html>
