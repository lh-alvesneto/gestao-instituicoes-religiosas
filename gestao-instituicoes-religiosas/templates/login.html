<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal IPVP — Gestão de Demandas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ipvp-logo-green: #084411;
      --ipvp-primary:     #156941;
      --ipvp-light:       #4DA186;
      --ipvp-bg:          #ffffff;
    }
    
    * { box-sizing: border-box; }
    
    body, html {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--ipvp-bg);
      height: 100%;
    }

    /* Layout Split-Screen */
    .split-layout {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* LADO ESQUERDO: Imagem e Logo */
    .split-left {
      flex: 1.2; 
      background-image: linear-gradient(rgba(8, 68, 17, 0.90), rgba(8, 68, 17, 0.50)), url('{{ url_for('static', filename='ipvp-ceras.png') }}');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .split-left img {
      width: 100%;
      max-width: 280px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      transform: rotate(-3deg);
      opacity: 0.9;
    }

    /* LADO DIREITO: Formulário Branco */
    .split-right {
      flex: 1;
      background: #ffffff;
      display: flex;
      align-items: center; /* Centraliza VERTICALMENTE */
      justify-content: center; /* Centraliza HORIZONTALMENTE */
      padding: 40px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05); 
    }

    /* O Agrupamento do Formulário */
    .form-wrapper {
      width: 100%;
      max-width: 420px; /* Largura controlada e centralizada */
    }

    /* Hierarquia de Títulos */
    .form-wrapper .greeting {
      font-size: 0.85rem; 
      font-weight: 600; 
      color: #9ca3af; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      margin-bottom: 6px;
    }

    .form-wrapper h2 {
      font-size: 2.2rem; 
      font-weight: 800; 
      color: #111827; 
      margin-bottom: 8px; 
      line-height: 1.1;
    }
    
    .form-wrapper .subtitle {
      font-size: 1rem; 
      color: #6b7280; 
      margin-bottom: 40px; 
    }

    .form-group { margin-bottom: 20px; }
    
    .form-group label {
      display: block; 
      font-size: 0.85rem; 
      font-weight: 500;
      color: #374151; 
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem; 
      font-family: inherit;
      transition: all .2s ease;
      outline: none;
      color: #111827;
    }
    
    .form-input:focus {
      border-color: var(--ipvp-primary);
      box-shadow: 0 0 0 3px rgba(21, 105, 65, 0.15);
    }
    
    .btn-login {
      width: 100%; padding: 12px;
      background: var(--ipvp-primary); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .2s; margin-top: 10px;
    }
    
    .btn-login:hover { background: var(--ipvp-logo-green); }

    .alert-flash {
      padding: 12px 16px; border-radius: 8px;
      font-size: 0.9rem; margin-bottom: 30px; 
      display: flex; align-items: center; gap: 10px; text-align: left;
    }
    .alert-flash.danger  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-flash.warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .alert-flash.info    { background: #f0fdf4; color: var(--ipvp-primary); border: 1px solid #bbf7d0; }
    .alert-flash.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* Responsividade */
    @media (max-width: 768px) {
      .split-layout { flex-direction: column; }
      
      .split-left {
        flex: none;
        height: 250px; 
        padding: 20px;
      }
      
      .split-left img { max-width: 150px; }
      
      .split-right {
        max-width: 100%;
        padding: 30px 20px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="split-layout">
    
    <div class="split-left">
      <img src="{{ url_for('static', filename='ipvp-logo.png') }}" alt="Logotipo IP Vila Paula">
    </div>

    <div class="split-right">
      <div class="form-wrapper">
        
        <div class="greeting">Bem-vindo(a) à</div>
        <h2>Central de Demandas</h2>
        <p class="subtitle">IP Vila Paula - Manutenção e Gestão</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="alert-flash {{ cat }}">
                <i class="bi bi-{{ 'check-circle' if cat == 'success' or cat == 'info' else 'exclamation-triangle' }}"></i>
                {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="form-group">
            <label>E-mail de acesso</label>
            <input type="email" name="email" class="form-input"
                   placeholder="usuario@dominio.com" required autofocus/>
          </div>
          
          <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" class="form-input"
                   placeholder="••••••••" required/>
          </div>
          
          <button type="submit" class="btn-login">
            Entrar
          </button>
        </form>

      </div>
    </div>
    
  </div>

</body>
</html>
